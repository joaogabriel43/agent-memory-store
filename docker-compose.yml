services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-memory-store-db
    environment:
      POSTGRES_DB: agent_memory_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_memory_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
