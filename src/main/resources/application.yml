spring:
  application:
    name: agent-memory-store

  datasource:
    url: jdbc:p6spy:postgresql://localhost:5432/agent_memory_store
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
