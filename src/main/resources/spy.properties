#################################################################
# P6Spy Configuration
# https://p6spy.readthedocs.io/en/latest/configandusage.html
#################################################################

# Actual JDBC driver that p6spy wraps
driverlist=org.postgresql.Driver

# Log format: include SQL, execution time, and category
logMessageFormat=com.p6spy.engine.spy.appender.MultiLineFormat

# Append to log file (use com.p6spy.engine.spy.appender.Slf4JLogger for SLF4J)
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# Exclude logging of these categories (leave empty to log all)
excludecategories=info,debug,result,resultset,batch
