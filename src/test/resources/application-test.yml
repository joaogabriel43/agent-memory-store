spring:
  application:
    name: agent-memory-store

  datasource:
    url: jdbc:p6spy:postgresql://localhost:5432/agent_memory_store_test
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: sk-test-placeholder
