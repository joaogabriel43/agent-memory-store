spring:
  application:
    name: agent-memory-store-test

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: sk-test-key-for-wiremock
      base-url: http://localhost:${wiremock.server.port:8089}

# Hybrid search weights for tests
memory:
  search:
    semantic-weight: 0.7
    recency-weight: 0.3

# Resilience4j - more aggressive thresholds for testing
resilience4j:
  circuitbreaker:
    instances:
      embeddingService:
        sliding-window-size: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 1s
        permitted-number-of-calls-in-half-open-state: 1
